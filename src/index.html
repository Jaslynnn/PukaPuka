<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PukaPuka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- p5 v1.9.4 + p5.sound (pinned — ml5@0.12.2 requires p5 v1.x) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
  <!-- ml5 COCO-SSD (pinned to stable 0.12.2) -->
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <!-- MediaPipe SelfieSegmentation — person-shaped mask for silhouettes -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1675465747/selfie_segmentation.js" crossorigin="anonymous"></script>

  <!-- modules: config must be first, sketch last -->
  <script src="modules/config.js"></script>
  <script src="modules/audio.js"></script>
  <script src="modules/note.js"></script>
  <script src="modules/staff.js"></script>
  <script src="modules/detection.js"></script>
  <script src="modules/renderer.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
